replicaCount: 2

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 200m
    memory: 256Mi

  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  path: /actuator/health
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  path: /actuator/health
  initialDelaySeconds: 15
  periodSeconds: 5

serviceAccount:
  create: true
  name: ""

ingress:
  enabled: false
  className: nginx

  annotations: {}

  hosts:
    - host: order-service.local
      paths:
        - path: /
          pathType: Prefix

  tls: []

autoscaling:
  enabled: false