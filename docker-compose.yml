version: "3.9"

services:

  order-service:
    build: .
    container_name: order-service

    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:latest

    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - order-service

  grafana:
    image: grafana/grafana-oss:latest

    container_name: grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus